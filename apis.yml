name: Google Places
description: >-
  The Google Places API is a service that accepts HTTP requests for location
  data through a variety of methods. It returns formatted location data and
  imagery about establishments, geographic locations, or prominent points of
  interest. Supports nearby search, text search, place details, place photos,
  and autocomplete.
